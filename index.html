<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#cc2200">
  <meta name="app-version" content="1.4.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ortswehr">
  <title>Ortswehr</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Login -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">🚒</div>
    <h1>Ortswehr</h1>
    <p class="sub">Freiwillige Feuerwehr</p>
    <div class="form-row">
      <label>E-Mail</label>
      <input id="login-email" type="email" placeholder="name@beispiel.de" autocomplete="email">
    </div>
    <div class="form-row">
      <label>Passwort</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" id="login-btn">Anmelden</button>
    <p class="error-msg" id="login-error"></p>
    <p style="text-align:center;margin-top:0.8rem">
      <a href="#" id="pw-reset-link" style="color:var(--red);font-size:0.82rem;text-decoration:none">Passwort vergessen?</a>
    </p>
    <div id="pw-reset-box" style="display:none;margin-top:0.8rem">
      <input id="reset-email" type="email" placeholder="Deine E-Mail-Adresse">
      <button type="button" class="btn btn-primary btn-full" id="reset-btn" style="margin-top:0.5rem">Reset-Mail senden</button>
      <p id="reset-msg" style="font-size:0.82rem;margin-top:0.5rem;text-align:center"></p>
    </div>
  </div>
</div>

<!-- App Shell -->
<div id="app" class="hidden">
  <header>
    <button id="back-btn" class="header-back hidden">&#8249;</button>
    <h1 id="page-title">Dashboard</h1>
    <button id="header-action" class="header-action hidden"></button>
  </header>
  <main id="main-content"></main>
  <nav class="bottom-nav">
    <button class="nav-btn aktiv" data-page="dashboard"><span class="nav-icon">🏠</span><span>Start</span></button>
    <button class="nav-btn" data-page="einsaetze"><span class="nav-icon">🚨</span><span>Einsätze</span></button>
    <button class="nav-btn" data-page="dienste"><span class="nav-icon">📅</span><span>Dienste</span></button>
    <button class="nav-btn" data-page="profil"><span class="nav-icon">👤</span><span>Profil</span></button>
    <button class="nav-btn hidden" data-page="kameraden" id="nav-kameraden"><span class="nav-icon">👥</span><span>Kameraden</span></button>
    <button class="nav-btn hidden" data-page="ortswehren" id="nav-ortswehren"><span class="nav-icon">🏘️</span><span>Wehren</span></button>
  </nav>
</div>

<div id="toast"></div>
<div id="update-banner" style="display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:999;background:#1e293b;color:#fff;border-radius:14px;padding:0.7rem 1.2rem;display:none;align-items:center;gap:0.8rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:0.88rem;white-space:nowrap">
  🆕 Neue Version verfügbar
  <button id="update-btn" style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:0.35rem 0.9rem;font-size:0.85rem;cursor:pointer;font-weight:600">Jetzt aktualisieren</button>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, updateDoc, deleteDoc, query, where, orderBy, Timestamp }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getMessaging, getToken, onMessage }
    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDwV6LJUnL660nQnnlQ47QZnBc_bXzIezU",
    authDomain: "ffw-oegeln-791ca.firebaseapp.com",
    projectId: "ffw-oegeln-791ca",
    storageBucket: "ffw-oegeln-791ca.firebasestorage.app",
    messagingSenderId: "170034438620",
    appId: "1:170034438620:web:f2e40bf21b6a9b6987ef19"
  };
  const VAPID = 'BDpa4LsgE1SlkshoyiVWt7EQbSi2YVp0Z_27N1Ms6sxGA4qogEPI3PWcRTwn3vvsYAhT8b1mD3Hpj6plCx5CySg';

  const firebaseApp = initializeApp(firebaseConfig);
  const auth      = getAuth(firebaseApp);
  const db        = getFirestore(firebaseApp);
  let   messaging = null;
  try { messaging = getMessaging(firebaseApp); } catch(e) {}

  window.fw = {
    auth, db, messaging, user: null, profil: null,

    async getDoc(path)          { return getDoc(doc(db, path)); },
    async setDoc(path, data)    { return setDoc(doc(db, path), data, { merge: true }); },
    async updateDoc(path, data) { return updateDoc(doc(db, path), data); },
    async deleteDoc(path)       { return deleteDoc(doc(db, path)); },
    async addDoc(col, data)     { return addDoc(collection(db, col), data); },
    async getDocs(col, ...c) {
      const q = c.length ? query(collection(db, col), ...c) : collection(db, col);
      return getDocs(q);
    },
    where, orderBy, Timestamp,
    isWehrfuehrer() { return this.profil?.rolle === 'wehrfuehrer'; },

    toast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (isError ? ' error' : '');
      setTimeout(() => t.className = '', 2800);
    },
    setTitle(t)  { document.getElementById('page-title').textContent = t; },
    showBack(cb) { const b=document.getElementById('back-btn'); b.classList.remove('hidden'); b.onclick=cb; },
    hideBack()   { document.getElementById('back-btn').classList.add('hidden'); },
    showHeaderAction(label, cb) { const b=document.getElementById('header-action'); b.classList.remove('hidden'); b.textContent=label; b.onclick=cb; },
    hideHeaderAction() { document.getElementById('header-action').classList.add('hidden'); },

    async registerPush() {
      if (!messaging) { console.warn('Push: messaging nicht verfügbar'); return null; }
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { this.toast('Push: Berechtigung verweigert', true); return null; }
        // Firebase SW registrieren und warten bis er aktiv ist
        const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        await new Promise(resolve => {
          if (swReg.active) { resolve(); return; }
          const sw = swReg.installing || swReg.waiting;
          if (sw) { sw.addEventListener('statechange', e => { if (e.target.state === 'activated') resolve(); }); }
          else { swReg.addEventListener('updatefound', () => {
            swReg.installing.addEventListener('statechange', e => { if (e.target.state === 'activated') resolve(); });
          }); }
          // Fallback nach 3s
          setTimeout(resolve, 3000);
        });
        const token = await getToken(messaging, { vapidKey: VAPID, serviceWorkerRegistration: swReg });
        if (token) {
          await this.setDoc('users/' + this.user.uid, { fcmToken: token });
        } else {
          console.warn('Push: Kein Token erhalten');
        }
        return token;
      } catch(e) {
        console.error('Push Fehler:', e);
        this.toast('Push: ' + (e.message || e.code), true);
        return null;
      }
    },
  };

  if (messaging) {
    onMessage(messaging, payload => {
      // App ist im Vordergrund: Service Worker zeigt die Benachrichtigung bereits
      // Kein doppelter Toast nötig
      console.log('FCM Vordergrund-Nachricht empfangen:', payload.notification?.title);
    });
  }

  // Login
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    document.getElementById('login-error').textContent = '';
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { document.getElementById('login-error').textContent = 'E-Mail oder Passwort falsch'; }
  });
  ['login-email','login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  });

  // Passwort vergessen
  document.getElementById('pw-reset-link').addEventListener('click', e => {
    e.preventDefault();
    const box = document.getElementById('pw-reset-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('reset-email').value.trim();
    const msg   = document.getElementById('reset-msg');
    if (!email) { msg.textContent='Bitte E-Mail eingeben'; msg.style.color='var(--red)'; return; }
    try {
      await sendPasswordResetEmail(auth, email);
      msg.textContent = '✅ Reset-Mail gesendet!'; msg.style.color = 'var(--success)';
    } catch(e) { msg.textContent = 'E-Mail nicht gefunden'; msg.style.color = 'var(--red)'; }
  });

  // Auth State
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      fw.user = user;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        fw.profil = { id: user.uid, ...snap.data() };
      } else {
        fw.profil = { id: user.uid, email: user.email, rolle: 'kamerad',
          vorname: '', nachname: '', dienstgrad: '',
          notif_einsatz: true, notif_uebung: true, notif_bestaetigung: true };
        await setDoc(doc(db, 'users', user.uid), fw.profil);
      }
      if (fw.isWehrfuehrer()) {
        document.getElementById('nav-kameraden').classList.remove('hidden');
        document.getElementById('nav-ortswehren').classList.remove('hidden');
      }
      if (fw.profil.notif_einsatz || fw.profil.notif_uebung || fw.profil.notif_bestaetigung) {
        // Warten bis SW bereit ist bevor Push registriert wird
        navigator.serviceWorker.ready.then(() => fw.registerPush()).catch(() => {});
      }
      document.getElementById('login-page').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      navigate('dashboard');
    } else {
      fw.user = null; fw.profil = null;
      document.getElementById('login-page').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }
  });

  window.navigate = function(page, params = {}) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('aktiv', b.dataset.page === page));
    fw.hideBack(); fw.hideHeaderAction();
    document.getElementById('main-content').innerHTML = '<div class="loading">⏳</div>';
    window._pages[page]?.(document.getElementById('main-content'), params);
  };
  window._pages = {};
  window.registerPage = (name, fn) => { window._pages[name] = fn; };
  document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => navigate(b.dataset.page)));

  // Neuen Kamerad anlegen ohne Wehrführer auszuloggen
  window.createKamerad = async (email, pw, data) => {
    const { initializeApp: iApp, getApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
    const { getAuth: gAuth, createUserWithEmailAndPassword: createUser } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js');
    let tmp; try { tmp = getApp('tmp'); } catch(e) { tmp = iApp(firebaseConfig, 'tmp'); }
    const ta = gAuth(tmp);
    const cred = await createUser(ta, email, pw);
    await ta.signOut();
    await setDoc(doc(db, 'users', cred.user.uid), { ...data, email, aktiv: true, notif_einsatz: true, notif_uebung: true, notif_bestaetigung: true });
    return cred.user.uid;
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/ortswehr/sw.js');

    // Einmalig beim Start: version.json vom Server holen (nie gecacht)
    try {
      const res = await fetch('/ortswehr/version.json?t=' + Date.now());
      const { version } = await res.json();
      const lokal = document.querySelector('meta[name="app-version"]')?.content;
      if (lokal && version && version !== lokal) {
        // Neue Version da – Banner zeigen
        const banner = document.getElementById('update-banner');
        if (banner) banner.style.display = 'flex';
        document.getElementById('update-btn')?.addEventListener('click', () => {
          // Caches leeren und hart neu laden
          caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
            .then(() => window.location.reload(true));
        });
      }
    } catch(e) { /* offline – ignorieren */ }
  }
</script>
<script src="js/pages.js" type="module" defer></script>
</body>
</html>
